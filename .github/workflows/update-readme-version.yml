name: Update README Version on Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Replace Version String in README
        uses: richardrigutins/replace-in-file-action@v2
        with:
          files: 'README.md'
          # Looks specifically for your project header and its version markdown tag
          search: '### \[BIM Clash Portal\]\(https:\/\/github\.com\/ask-io\/clash-portal\) \&nbsp;\`v[0-9]+\.[0-9]+\.[0-9]+\`'
          replacement: '### [BIM Clash Portal](https://github.com/ask-io/clash-portal) &nbsp;`${{ github.event.release.tag_name }}`'

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automatically update README version to ${{ github.event.release.tag_name }}"
          file_pattern: 'README.md'